<style>
  :root {
    --bg:#fdf8f5; --card:#fff; --ink:#1a1410; --ink-dim:#5c4d42; --ink-mute:#9b8a7e;
    --line:#ede4db; --line-strong:#ddd0c4; --pink:#db2777; --pink-dim:#9d174d;
    --pink-soft:#fce7f3;
  }
  * { box-sizing:border-box; }
  body { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

         align-items:center; justify-content:center; margin:0; }
  .box { max-width:340px; width:90%; background:var(--card); border-radius:12px;

  h1 { font-size:1.1rem; margin:0 0 4px; color:var(--ink); }
  p { font-size:0.85rem; color:var(--ink-dim); margin:0 0 16px; }
  input { width:100%; box-sizing:border-box; font-size:1rem; padding:10px 12px;
          border:1px solid var(--line-strong); border-radius:8px; margin-bottom:10px;
          font-family:inherit; color:var(--ink); }
  button { font-size:0.9rem; font-weight:700; padding:10px 16px; border:none;
           border-radius:8px; background:var(--pink); color:#fff; cursor:pointer; }
  button:hover { background:var(--pink-dim); }
  label { font-size:0.8rem; display:block; margin-bottom:14px; color:var(--ink-dim); }
  #fout { color:var(--pink-dim); font-size:0.85rem; min-height:1.2em; margin-top:8px; }
</style>

async function ontsleutel(pw) {
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:b64(SALT), iterations:ITER, hash:"SHA-256" },
    mat, { name:"AES-GCM", length:256 }, false, ["decrypt"]);

    document.open(); document.write(html); document.close();
  } catch (e) {
    if (viaOpslag) { localStorage.removeItem("dash_pw"); }
    else { document.getElementById("fout").textContent = "Onjuist wachtwoord."; }
  }
}
document.getElementById("f").addEventListener("submit", ev => {

});
