<style>
  :root {

  input { width:100%; box-sizing:border-box; font-size:1rem; padding:10px 12px;
          border:1px solid var(--line-strong); border-radius:8px; margin-bottom:10px;
          font-family:inherit; color:var(--ink); }
  button { font-size:0.9rem; font-weight:700; padding:10px 16px; border:none;
           border-radius:8px; background:var(--pink); color:#fff; cursor:pointer; }
  button:hover { background:var(--pink-dim); }
  label { font-size:0.8rem; display:block; margin-bottom:14px; color:var(--ink-dim); }
  #fout { color:var(--pink-dim); font-size:0.85rem; min-height:1.2em; margin-top:8px; }
</style>
