function b64(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function ontsleutel(pw) {
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:b64(SALT), iterations:ITER, hash:"SHA-256" },
    mat, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64(NONCE) }, key, b64(DATA));
  return new TextDecoder().decode(plain);
}
async function probeer(pw, viaOpslag) {
  try {
    const html = await ontsleutel(pw);
    if (document.getElementById("onthoud").checked) localStorage.setItem("dash_pw", pw);
    document.open(); document.write(html); document.close();
  } catch (e) {
    if (viaOpslag) { localStorage.removeItem("dash_pw"); }
    else { document.getElementById("fout").textContent = "Onjuist wachtwoord."; }
  }
}
document.getElementById("f").addEventListener("submit", ev => {
  ev.preventDefault(); probeer(document.getElementById("pw").value, false);
});
const bewaard = localStorage.getItem("dash_pw");
if (bewaard) { document.getElementById("onthoud").checked = true; probeer(bewaard, true); }
